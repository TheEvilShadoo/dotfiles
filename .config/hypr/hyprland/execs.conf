# Auth and Environment
exec-once = /usr/libexec/hyprpolkitagent
exec-once = dbus-update-activation-environment --systemd HYPRLAND_INSTANCE_SIGNATURE WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = /home/ryan/.config/hypr/scripts/XDPH.sh
exec-once = xrandr --output eDP-1 --primary

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Auto delete trash 30 days old
exec-once = trash-empty 30

# Theme
exec-once = hyprctl setcursor $cursorTheme $cursorSize
exec-once = gsettings set org.gnome.desktop.interface cursor-theme '$cursorTheme'
exec-once = gsettings set org.gnome.desktop.interface cursor-size $cursorSize
exec-once = gsettings set org.gtk.Settings.FileChooser window-size '(800,600)'
exec-once = gsettings set org.gnome.desktop.interface icon-theme "Dracula"
exec-once = gsettings set org.gnome.desktop.interface gtk-theme "Dracula"
exec-once = gsettings set org.gnome.desktop.wm.preferences theme "Dracula"

# Location provider and night light
#exec-once = /usr/lib/geoclue-2.0/demos/agent
exec-once = sleep 1 && gammastep-indicator
exec-once = sleep 2 && keepassxc

# Forward bluetooth media commands to MPRIS
exec-once = mpris-proxy

# Terminal server
# Service should now handle
#exec-once = foot --server

# Resize and move windows based on matches (e.g. pip)
exec-once = caelestia resizer -d

# Start shell
exec-once = caelestia shell -d
