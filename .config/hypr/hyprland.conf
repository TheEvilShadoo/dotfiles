# Caelestia hyprland config

$hypr = ~/.config/hypr
$hl = $hypr/hyprland

# Variables (colours + other vars)
exec = cp -L --no-preserve=mode --update=none $hypr/scheme/default.conf $hypr/scheme/current.conf
source = $hypr/scheme/current.conf
source = $hypr/variables.conf

# Default monitor conf
monitor = , preferred, auto, 1

# Configs
source = $hl/env.conf
source = $hl/general.conf
source = $hl/input.conf
source = $hl/misc.conf
source = $hl/animations.conf
source = $hl/decoration.conf
source = $hl/group.conf
source = $hl/execs.conf
source = $hl/rules.conf
source = $hl/gestures.conf
source = $hl/keybinds.conf
source = $hl/scrolling.conf


# TheEvilShadoo's Hyprland config

# See https://wiki.hyprland.org/Configuring/Monitors/
monitor=eDP-1, 2560x1600@165, 0x0, 1.6
monitor=eDP-2, 2560x1600@165, 0x0, 1.6
monitor=DP-3, 1680x1050@60, 2560x0, 1
monitor=DP-4, 1680x1050@60, 1600x0, 1
# monitor = , preferred, auto, 1, mirror, eDP-1

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
general {
    col.active_border = rgb(44475a) rgb(bd93f9) 90deg
    col.inactive_border = rgba(44475aaa)
    col.nogroup_border = rgba(282a36dd)
    col.nogroup_border_active = rgb(bd93f9) rgb(44475a) 90deg
}

misc {
    force_default_wallpaper = -1 # Set to 0 or 1 to disable the anime mascot wallpapers
    disable_hyprland_logo = false # If true disables the random hyprland logo / anime girl background. :(
    middle_click_paste = false
    enable_swallow = true
    swallow_regex = ^(foot.*)$
    vrr = 0
}

cursor {
    no_hardware_cursors = true
    inactive_timeout = 3
}

animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    bezier = windowOpen, 0.01, 0.97, 0.5, 1.0
    bezier = workspaceSwitch, 0.11, 0.76, 0.04, 1

    animation = windows, 1, 4, windowOpen
    animation = windowsOut, 1, 7, default, popin 70%
    animation = border, 1, 10, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 5, workspaceSwitch
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    preserve_split = yes # you probably want this
    force_split=2 #Forces split to the right instead of following mouse
    special_scale_factor = 0.75
}

xwayland {
    force_zero_scaling = true
}

windowrule {
    name = windowrule-1
    workspace = 4 silent
    #monitor = DP-4
    match:class = ^(steam|com.valvesoftware.Steam)$
    match:title = .+
}

windowrule {
    name = windowrule-2
    float = on
    match:initial_class = ^(steam)(.*)$
}

windowrule {
    name = windowrule-2.1
    workspace = 4 silent
    #monitor = DP-4
    tile = on
    match:title = ^(Steam)$
}

windowrule {
    name = windowrule-2.2
    monitor = eDP-1
    workspace = 1 silent
    rounding = 0
    match:title = ^(notificationtoasts.*)$
}

windowrule {
    name = windowrule-3
    workspace = 1 silent
    match:class = ^(steam_app_.*|.*[Ww]ine.*)$
}

windowrule {
    name = windowrule-4
    workspace = 1 silent
    match:class = ^(hollow_knight)(.*)$
}

#windowrule {
#    name = windowrule-5
#    monitor = DP-4
#    workspace = 5 silent
#    match:class = ^(vesktop)$
#}

windowrule {
    name = windowrule-7
    border_color = rgb(ff5555)
    match:xwayland = 1 # check if window is xwayland
}

# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, footclient
bind = $mainMod SHIFT, RETURN, exec, ~/.config/hypr/scripts/scratchpad.sh terminal
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT, SPACE, togglefloating,
bind = $mainMod, D, exec, ~/.config/rofi/launchers/type-3/launcher.sh
bind = $mainMod, V, pseudo, # dwindle
bind = $mainMod, T, layoutmsg, togglesplit, # dwindle
bind = $mainMod SHIFT, R, exec, footclient -e btop
bind = $mainMod, BACKSPACE, global, caelestia:session
bind = $mainMod SHIFT, Q, global, caelestia:session
bind = $mainMod, TAB, workspace, previous
bind = $mainMod, grave, exec, ~/.local/bin/rofimoji
bind = $mainMod SHIFT, grave, exec, ~/.local/bin/kaomoji-rofi
bind = $mainMod, F9, exec, ~/.local/bin/rofimount
bind = $mainMod, F10, exec, ~/.local/bin/rofiumount
bind = $mainMod, apostrophe, exec, ~/.config/hypr/scripts/scratchpad.sh calculator
bind = $mainMod, M, exec, footclient -e ncmpcpp
bind = ,F8,pass,^(vesktop)$
bind = ,F9,pass,^(vesktop)$

# Media keys
bind = ,XF86AudioStop, exec, playerctl stop
bind = ,XF86AudioPrev, exec, playerctl previous
bind = ,XF86AudioPlay, exec, playerctl play-pause
bind = ,XF86AudioNext, exec, playerctl next

bind = SHIFT ,XF86AudioStop, execr, mpc stop
bind = SHIFT ,XF86AudioPrev, execr, mpc prev
bind = SHIFT ,XF86AudioPlay, execr, mpc toggle
bind = SHIFT ,XF86AudioNext, execr, mpc next

bind = $mainMod, comma, execr, mpc prev 
bind = $mainMod SHIFT, comma, execr, mpc seek 0%
bind = $mainMod, period, execr, mpc next
bind = $mainMod SHIFT, period, execr, mpc repeat

bind = $mainMod, bracketleft, execr, mpc seek -10
bind = $mainMod SHIFT, bracketleft, execr, mpc seek -60
bind = $mainMod, bracketright, execr, mpc seek +10
bind = $mainMod SHIFT, bracketright, execr, mpc seek +60

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspacesilent, 1
bind = $mainMod SHIFT, 2, movetoworkspacesilent, 2
bind = $mainMod SHIFT, 3, movetoworkspacesilent, 3
bind = $mainMod SHIFT, 4, movetoworkspacesilent, 4
bind = $mainMod SHIFT, 5, movetoworkspacesilent, 5
bind = $mainMod SHIFT, 6, movetoworkspacesilent, 6
bind = $mainMod SHIFT, 7, movetoworkspacesilent, 7
bind = $mainMod SHIFT, 8, movetoworkspacesilent, 8
bind = $mainMod SHIFT, 9, movetoworkspacesilent, 9

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Framework key
bind=,XF86Tools,exec,swaync-client -t

# Screenshots
#bind=,Print,exec,mkdir -p ~/Pictures/screenshots; grim -t png -g "$(slurp)" ~/Pictures/screenshots/$(date +%Y-%m-%d_%H-%m-%s).png; wl-copy < $_

# Laptop Lid
bindl = , switch:on:Lid Switch,  exec, loginctl suspend-then-hibernate
bindl = , switch:off:Lid Switch, exec, sleep 1 && hyprctl dispatch dpms on
