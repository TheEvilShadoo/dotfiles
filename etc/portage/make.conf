# TheEvilShadoo's make.conf
# Source external files
NTHREADS="auto"
source /usr/share/fetchcommandwrapper/make.conf

# My custom flags
COMMON_FLAGS="-march=native -O2 -pipe -mtls-dialect=gnu2"
CFLAGS="${COMMON_FLAGS}"
CXXFLAGS="${CFLAGS}"
FCFLAGS="${CFLAGS}"
FFLAGS="${CFLAGS}"
LDFLAGS="-Wl,-O1 -Wl,--as-needed -fuse-ld=mold"
USE="-emacs -gnome -systemd -X \
     appindicator jemalloc mimalloc offensive pipewire pulseaudio screencast tcmalloc truetype \
     vaapi wayland"

# System variables
ABI_X86="64"
ACCEPT_KEYWORDS="amd64"
ACCEPT_LICENSE="-* @FREE"
BINPKG_COMPRESS="lz4"
BINPKG_FORMAT="gpkg"
CMAKE_MAKEFILE_GENERATOR="ninja"
CPU_FLAGS_X86="aes avx avx2 bmi1 bmi2 f16c fma3 mmx mmxext pclmul popcnt rdrand sse sse2 sse3 sse4_1 sse4_2 ssse3"
DISTDIR="/var/cache/distfiles"
EMERGE_DEFAULT_OPTS="--autounmask --autounmask-write --autounmask-keep-masks=n --autounmask-unrestricted-atoms --color=y --jobs=16 --keep-going=y --load-average=16 --jobs-tmpdir-require-free-gb=0"
FEATURES="candy getbinpkg parallel-fetch parallel-install -ebuild-locks -merge-wait"
GRUB_PLATFORMS="efi-64"
INPUT_DEVICES="libinput"
L10N="en-US"
LC_MESSAGES="C"
LINGUAS="en-US"
MAKEOPTS="-j16 -l16"
MICROCODE_SIGNATURES="-S"
PKGDIR="/var/cache/binpkgs"
PORTAGE_SCHEDULING_POLICY="idle"
PORTDIR="/var/db/repos/gentoo"
VIDEO_CARDS="amdgpu radeonsi"

GENTOO_MIRRORS="https://104.18.6.32/gentoo/ \
    http://mirror.leaseweb.com/gentoo/ \
    https://mirrors.mit.edu/gentoo-distfiles/ \
    https://mirror.keiminem.com/gentoo/ \
    https://mirror.reenigne.net/gentoo/ \
    rsync://mirror.planetunix.net/gentoo/ \
    rsync://elara.ca.ext.planetunix.net/gentoo/ \
    rsync://elda.asgardius.company/gentoo \
    https://ftp.belnet.be/pub/rsync.gentoo.org/gentoo/ \
    http://gentoo.mirrors.ovh.net/gentoo-distfiles/"
